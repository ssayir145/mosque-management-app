[build]
  command = "npm run build:client"
  publish = "client/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."scheduled-monthly-charge"]
  schedule = "0 0 1 * *"

[dev]
  command = "cd client && npm run dev"
  targetPort = 5173
  port = 8888
  publish = "client/dist"
  autoLaunch = false

# --- API redirects (most specific first; functions read event.httpMethod) ---

[[redirects]]
  from = "/api/auth/login/resident"
  to = "/.netlify/functions/auth-login-resident"
  status = 200

